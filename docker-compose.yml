version: '3.8'
services:
  mon-app:
    build: .
    ports:
    - "8080:8080"
  ma-base-de-donnees:
    image: postgres:14-alpine
    ports:
    - "5432:5432"
    environment:
      POSTGRES_PASSWORD: root
  db-admin:
    image: adminer
    restart: always
    ports:
      - "8081:8080"  # Relie le 8081 (PC) au 8080 (Conteneur Adminer)

volumes:
  db-data: