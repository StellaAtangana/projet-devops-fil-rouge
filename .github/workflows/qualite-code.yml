name: Vérification de la qualité du code

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./projet-devops-fil-rouge

    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Installation de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Installer les dépendances du projet
        run: npm install

      - name: Vérification ESLint
        run: npm run lint

      - name: Lancer les tests automatisés
        run: npm test

      - name: Upload artefact du site
        uses: actions/upload-artifact@v4
        with:
          name: mon-site-web
          path: projet-devops-fil-rouge/index.html
  